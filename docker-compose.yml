version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: photo-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    container_name: photo-backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://root:QU8p10Vs3A5r2MqD@47.108.149.4:30017/photo?replicaSet=rs0&retryWrites=false
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      QWEN_API_KEY: ${QWEN_API_KEY}
    depends_on:
      - minio

volumes:
  minio_data:
